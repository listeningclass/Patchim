<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Xây Âm Tiết Hàn – Luyện Patchim & Từ Vựng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#FBF4E8; --bg2:#EFE8FA;
    --ink:#3A3552; --ink-soft:#6B6483;
    --cell-bg:#FFF7E6; --cell-border:#EAD9A6;
    --cell-empty-bg:#FFFDF7; --cell-empty-border:#E4D8B8;
    --accent:#FF8F6B; --accent-dark:#E5714E;
    --mint:#7FCBAE; --mint-bg:#E1F6EC; --mint-border:#5FBF8D;
    --wrong-bg:#FCE2E1; --wrong-border:#E36F65;
    --lav:#C9BCF2; --lav-dark:#8F7DDB;
    --card-shadow: 0 10px 30px rgba(80,60,120,0.12);
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Be Vietnam Pro', sans-serif;
    background: radial-gradient(circle at 15% 10%, #FFF6E9 0%, transparent 45%),
                radial-gradient(circle at 90% 85%, #EAE1FB 0%, transparent 50%),
                linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment: fixed;
    color: var(--ink);
    min-height:100vh;
    padding: 10px;
    overflow-x:hidden;
  }
  .korean{ font-family:'Jua','Nanum Gothic','Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  #app{ width:100%; max-width:760px; margin:0 auto; }
  .screen{ display:none; }
  .screen.active{ display:block; animation: fadeIn .35s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .card{
    background:#fff;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 15px 14px;
  }

  h1.gate-title{
    font-family:'Baloo 2', sans-serif;
    font-size: clamp(24px, 5vw, 34px);
    text-align:center;
    color: var(--accent-dark);
    margin: 0 0 28px;
  }
  .name-row{ display:flex; flex-direction:column; gap:14px; align-items:center; }
  #nameInput{
    width:100%; max-width:360px;
    font-size:20px; font-family:'Be Vietnam Pro', sans-serif;
    padding:14px 18px; border-radius:14px;
    border:2px solid var(--cell-border);
    outline:none; text-align:center;
    background: var(--cell-empty-bg);
  }
  #nameInput:focus{ border-color: var(--accent); }
  .big-btn{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:17px;
    color:#fff; background: linear-gradient(180deg, var(--accent), var(--accent-dark));
    border:none; border-radius:16px; padding:11px 28px; cursor:pointer;
    box-shadow: 0 6px 0 #C85A38, 0 10px 18px rgba(229,113,78,0.25);
    transition: transform .08s ease;
  }
  .big-btn:active{ transform: translateY(4px); box-shadow: 0 2px 0 #C85A38; }
  .big-btn:disabled{ opacity:.45; cursor:not-allowed; box-shadow:none; }
  .big-btn.secondary{
    background: linear-gradient(180deg, #fff, #F3F0FF);
    color: var(--lav-dark); box-shadow: 0 6px 0 #cfc4f2, 0 10px 18px rgba(143,125,219,.15);
  }
  .big-btn.secondary:active{ box-shadow:0 2px 0 #cfc4f2; }

  /* progress */
  #progressWrap{ background:#fff; border-radius:999px; padding:5px; box-shadow: var(--card-shadow); margin-bottom:6px; }
  #progressTrack{ height:18px; background:#F1ECFB; border-radius:999px; overflow:hidden; }
  #progressBar{ height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg, var(--mint), #4FB58A); transition: width .4s ease; }
  #progressLabel{ text-align:center; font-size:12px; color:var(--ink-soft); margin: 4px 2px 0; font-family:'Baloo 2',sans-serif; }

  /* hint panel */
  #hintPanel{ margin-bottom:6px; }
  .hint-badge{ display:inline-block; font-family:'Baloo 2',sans-serif; background:var(--lav); color:#fff; font-size:13px; padding:4px 12px; border-radius:999px; margin-bottom:10px; }
  .hint-example{ display:flex; align-items:center; justify-content:center; gap:22px; flex-wrap:wrap; margin: 14px 0; }
  .hint-text{ text-align:center; color:var(--ink-soft); font-size:15px; line-height:1.6; }

  /* question area */
  #promptBox{ text-align:center; margin-bottom:8px; }
  .target-syllable{ font-family:'Jua', sans-serif; font-size: clamp(40px,10vw,60px); color:var(--ink); line-height:1; }
  .target-word{ font-family:'Jua', sans-serif; font-size: clamp(30px,9vw,46px); color:var(--ink); line-height:1; letter-spacing:2px; }
  .target-rom{ color:var(--accent-dark); font-size:14px; margin-top:4px; font-weight:600; }
  .target-meaning{ color:var(--ink-soft); font-size:13px; margin-top:2px; font-style:italic; }
  .equation-prompt{ font-family:'Jua',sans-serif; font-size: clamp(26px,7vw,38px); color:var(--ink); display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
  .equation-prompt .op{ color: var(--lav-dark); font-family:'Baloo 2',sans-serif; }
  .equation-prompt .qmark{ color: var(--accent-dark); }
  .instr-line{ color:var(--ink-soft); font-size:13px; margin-top:6px; }

  #revealBox{ text-align:center; margin: 2px 0 10px; padding:8px; background:var(--mint-bg); border-radius:14px; }
  #revealBox .reveal-syllable{ font-family:'Jua','Nanum Gothic','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: clamp(30px,7vw,40px); color:#2E7D5B; line-height:1.2; }
  #revealBox .reveal-rom{ font-family:'Be Vietnam Pro',sans-serif; color:#2E7D5B; font-weight:600; font-size:15px; }

  #blocksRow{ display:flex; justify-content:center; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:10px; }

  :root{ --cellsize: 64px; }

  .synblock{
    width: calc(var(--cellsize) * 2);
    border-radius:16px;
    overflow:hidden;
    border:3px solid var(--cell-border);
    background:var(--cell-bg);
    display:flex; flex-direction:column;
  }

  .cell{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    font-family:'Jua','Nanum Gothic','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size: calc(var(--cellsize) * 0.55);
    color: var(--ink);
    background: var(--cell-empty-bg);
    border: 1px dashed var(--cell-empty-border);
    width:100%;
    height: var(--cellsize);
    flex: 0 0 var(--cellsize);
    box-sizing:border-box;
  }
  .cell.filled{ background: var(--cell-bg); border-style:solid; }
  .cell.prefilled{ background: #F3ECD8; border-style:solid; color: var(--ink-soft); }
  .cell.correct{ background: var(--mint-bg) !important; border-color: var(--mint-border) !important; color:#2E7D5B; }
  .cell.wrong{ background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color:#B4453B; }
  .cell .rm-btn{
    position:absolute; top:3px; right:3px; width:24px; height:24px; line-height:22px;
    background:#fff; border:1px solid var(--cell-border); border-radius:50%;
    font-size:15px; color:#B4453B; text-align:center; cursor:pointer; display:none;
    font-family:'Baloo 2',sans-serif; z-index:2;
  }
  .cell.filled:not(.correct):not(.wrong) .rm-btn{ display:block; }

  /* shape: no-final, ngang (top/bottom) -- also used for compound (kép) vowels without final,
     since the consonant sits directly above the vowel, same as horizontal vowels */
  .shape-nf_ngang{ }

  /* shape: no-final, doc (left/right) -- two square cells side by side, each exactly cellsize */
  .shape-nf_doc{ flex-direction:row; }
  .shape-nf_doc .cell{ width: var(--cellsize); flex: 0 0 var(--cellsize); border-width: 0 1px 0 0; }
  .shape-nf_doc .cell:last-child{ border-right:none; }

  /* shape: final + ngang: 3 stacked, each exactly cellsize tall -- also used for compound (kép) vowels with final */
  .shape-f_ngang .cell{ border-bottom-width:1px; }

  /* shape: final + doc: grid top row (2 square cells) + full bottom row, all exactly cellsize */
  .shape-f_doc{ display:grid; grid-template-columns: var(--cellsize) var(--cellsize); grid-template-rows: var(--cellsize) var(--cellsize); }
  .shape-f_doc .cell{ width:100%; height:100%; }
  .shape-f_doc .cell.cho{ grid-column:1; grid-row:1; }
  .shape-f_doc .cell.jung{ grid-column:2; grid-row:1; }
  .shape-f_doc .cell.jong{ grid-column:1/3; grid-row:2; }

  .cell-tag{
    position:absolute; bottom:-1px; left:0; right:0;
    font-family:'Be Vietnam Pro',sans-serif; font-size:10px; text-align:center;
    color: var(--ink-soft); background:rgba(255,255,255,.75); line-height:1.3;
    display:none;
  }
  .show-tags .cell-tag{ display:block; }

  /* tray */
  #trayWrap{ text-align:center; margin-bottom:8px; }
  .tray-section{ margin-bottom:6px; }
  .tray-label{ font-family:'Baloo 2',sans-serif; font-size:12px; color:var(--ink-soft); margin-bottom:5px; }
  .tray-row{
    display:flex; justify-content:center; flex-wrap:wrap; gap:7px;
    min-height:56px; padding:8px;
    background: rgba(255,255,255,.55); border-radius:14px;
  }
  .tile{
    width:52px; height:52px; border-radius:12px; flex-shrink:0;
    background: linear-gradient(180deg,#fff, #FCEFD9);
    border:3px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-family:'Jua','Nanum Gothic','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size:23px; color:var(--accent-dark);
    box-shadow: 0 3px 0 #E9C68F;
    cursor:grab; touch-action:none; user-select:none;
    transition: opacity .15s ease;
  }
  .tile.hidden-tile{ visibility:hidden; pointer-events:none; }
  .tile.dragging{ position:fixed; z-index:999; pointer-events:none; box-shadow:0 10px 20px rgba(0,0,0,.25); }

  #actionRow{ text-align:center; }

  /* results */
  .result-hero{ text-align:center; margin-bottom:10px; }
  .result-hero .score{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:44px; color:var(--accent-dark); }
  .result-hero .name{ font-family:'Baloo 2',sans-serif; color:var(--ink); font-size:20px; }
  .review-item{
    border:2px solid var(--cell-border); border-radius:14px; padding:14px 16px; margin-bottom:12px;
    background: var(--cell-empty-bg);
  }
  .review-item .rh{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .review-item .rh .k{ font-family:'Jua',sans-serif; font-size:26px; }
  .review-item .yours{ color:#B4453B; font-size:14px; }
  .review-item .correct-ans{ color:#2E7D5B; font-size:14px; }
  #resultActions{ text-align:center; margin-top:20px; }

  footer.hint-note{ text-align:center; margin-top:14px; color:var(--ink-soft); font-size:12px; }

  @media (max-width:480px){
    :root{ --cellsize: 52px; }
    .tile{ width:46px; height:46px; font-size:21px; }
    .card{ padding:14px 10px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- GATE -->
  <section id="screen-gate" class="screen active">
    <div class="card">
      <h1 class="gate-title">Luyện tập tạo âm tiết</h1>
      <div class="name-row">
        <input id="nameInput" type="text" placeholder="Nhập tên của em..." maxlength="30" autocomplete="off">
        <button class="big-btn" id="btnStart" disabled>Bắt đầu 🚀</button>
      </div>
    </div>
  </section>

  <!-- GAME -->
  <section id="screen-game" class="screen">
    <div id="progressWrap">
      <div id="progressTrack"><div id="progressBar"></div></div>
    </div>
    <div id="progressLabel"></div>

    <div id="hintPanel" class="card" style="display:none;"></div>

    <div class="card">
      <div id="promptBox"></div>
      <div id="blocksRow"></div>
      <div id="revealBox" style="display:none;"></div>
      <div id="trayWrap">
        <div id="traySectionVowel" class="tray-section" style="display:none;">
          <div class="tray-label">Nguyên âm</div>
          <div id="trayVowel" class="tray-row"></div>
        </div>
        <div id="traySectionConsonant" class="tray-section">
          <div class="tray-label">Phụ âm</div>
          <div id="trayConsonant" class="tray-row"></div>
        </div>
      </div>
      <div id="actionRow">
        <button class="big-btn" id="btnConfirm" style="display:none;">확인하기 ✓</button>
        <button class="big-btn secondary" id="btnNext" style="display:none;">다음 문제 →</button>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="screen-result" class="screen">
    <div class="card">
      <div class="result-hero">
        <div class="name" id="resName"></div>
        <div class="score" id="resScore"></div>
      </div>
      <div id="resReview"></div>
      <div id="resultActions">
        <button class="big-btn" id="btnRestart">Làm lại từ đầu 🔄</button>
      </div>
    </div>
  </section>

</div>

/* ======================= HANGUL DECOMPOSITION ===================== */
const CHO_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG_LIST = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG_LIST = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const DOC_V = new Set(['ㅏ','ㅑ','ㅓ','ㅕ','ㅣ','ㅐ','ㅒ','ㅔ','ㅖ']);
const NGANG_V = new Set(['ㅗ','ㅛ','ㅜ','ㅠ','ㅡ']);

function decompose(ch){
  const code = ch.codePointAt(0) - 0xAC00;
  if(code < 0 || code > 11171) return null;
  const jong = code % 28;
  const jung = Math.floor(code/28) % 21;
  const cho = Math.floor(code/28/21);
  return { cho: CHO_LIST[cho], jung: JUNG_LIST[jung], jong: JONG_LIST[jong], hasFinal: jong !== 0 };
}
function vowelType(v){
  if(DOC_V.has(v)) return 'doc';
  if(NGANG_V.has(v)) return 'ngang';
  return 'kep';
}
function shapeFor(hasFinal, vtype){
  // Compound (kép) vowels start with a horizontal component (ㅡ/ㅗ/ㅜ), so the
  // initial consonant sits directly ABOVE the vowel block, exactly like "ngang" vowels.
  const family = (vtype === 'doc') ? 'doc' : 'ngang';
  if(!hasFinal) return family === 'doc' ? 'nf_doc' : 'nf_ngang';
  return family === 'doc' ? 'f_doc' : 'f_ngang';
}
function syllableInfo(ch){
  const d = decompose(ch);
  const vt = vowelType(d.jung);
  return { ch, cho:d.cho, jung:d.jung, jong:d.jong, hasFinal:d.hasFinal, vtype:vt, shape: shapeFor(d.hasFinal, vt) };
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text !== undefined) e.textContent = text;
  return e;
}

// Fixed worked-example syllables used ONLY for the level-1 "first time" hint panel.
// These are reserved out of the drawable pool so the example never repeats as a real question.
const DEMO_EXAMPLES = {
  doc:   { ch:'산', rom:'xan - x nhẹ' },
  ngang: { ch:'문', rom:'mun' },
  kep:   { ch:'원', rom:'quơn' }
};
Object.values(DEMO_EXAMPLES).forEach(d=>{ d.info = syllableInfo(d.ch); });

function buildQuestionSet(){
  const usedSyll = new Set(Object.values(DEMO_EXAMPLES).map(d=>d.ch));
  function drawSyllables(n, wantTypes){
    // try to satisfy wantTypes (array of vtypes) first among not-yet-used, then fill randomly
    const infos = SYLLABLES.map(s=>({ch:s[0], rom:s[1], info:syllableInfo(s[0])}))
      .filter(x => !usedSyll.has(x.ch));
    let chosen = [];
    if(wantTypes){
      wantTypes.forEach(t=>{
        const cand = shuffle(infos.filter(x=>x.info.vtype===t && !chosen.includes(x)));
        if(cand.length) chosen.push(cand[0]);
      });
    }
    const rest = shuffle(infos.filter(x=>!chosen.includes(x)));
    while(chosen.length < n && rest.length){ chosen.push(rest.shift()); }
    chosen = shuffle(chosen).slice(0,n);
    chosen.forEach(c=>usedSyll.add(c.ch));
    return chosen;
  }

  const qs = [];

  // LEVEL 1 (6): given vowel, fill cho+jong. Ensure doc/ngang/kep each appear at least once.
  drawSyllables(6, ['doc','ngang','kep']).forEach(c=>{
    qs.push({ level:1, mode:'recreate-prefillVowel', items:[{ch:c.ch, rom:c.rom, info:c.info}] });
  });

  // LEVEL 2 (6): equation prompt ㅅ+ㅏ+ㄴ=산, all blank
  drawSyllables(6, ['doc','ngang','kep']).forEach(c=>{
    qs.push({ level:2, mode:'equation', items:[{ch:c.ch, rom:c.rom, info:c.info}] });
  });

  // LEVEL 3 (4): single syllable, no hints at all, all blank
  drawSyllables(4).forEach(c=>{
    qs.push({ level:3, mode:'recreate-blank', items:[{ch:c.ch, rom:c.rom, info:c.info}] });
  });

  // LEVEL 4 (3): 2-syllable words from vocab
  const words2 = shuffle(VOCAB.filter(v=>v[0].length===2));
  pick(words2, Math.min(3, words2.length)).forEach(w=>{
    const items = w[0].split('').map(ch=>({ch, rom:null, info:syllableInfo(ch)}));
    qs.push({ level:4, mode:'recreate-blank-word', items, rom:w[1], meaning:w[2] });
  });

  // LEVEL 5 (1): 3-syllable word from vocab
  const words3 = shuffle(VOCAB.filter(v=>v[0].length===3));
  if(words3.length){
    const w = words3[0];
    const items = w[0].split('').map(ch=>({ch, rom:null, info:syllableInfo(ch)}));
    qs.push({ level:5, mode:'recreate-blank-word', items, rom:w[1], meaning:w[2] });
  }

  return qs;
}

/* ========================= RENDERING: BLOCKS ======================= */
function makeCell(role, expect, blockIdx){
  const c = el('div','cell '+role);
  c.dataset.role = role;
  c.dataset.expect = expect;
  c.dataset.block = blockIdx;
  const rm = el('span','rm-btn','×');
  rm.addEventListener('click', (e)=>{ e.stopPropagation(); revokeCell(c); });
  c.appendChild(rm);
  const tag = el('span','cell-tag', role==='cho'?'phụ âm đầu':role==='jung'?'nguyên âm':'phụ âm cuối');
  c.appendChild(tag);
  return c;
}

function buildSynBlock(info, blockIdx, opts){
  opts = opts || {};
  const wrap = el('div','synblock shape-'+info.shape);
  const cells = {};

  function attachText(cell, jamo){
    // put jamo text as first child (before rm-btn/tag which are appended already)
    const span = document.createTextNode(jamo);
    cell.insertBefore(span, cell.firstChild);
  }

  if(info.shape === 'nf_ngang' || info.shape === 'f_ngang'){
    cells.cho = makeCell('cho', info.cho, blockIdx);
    cells.jung = makeCell('jung', info.jung, blockIdx);
    wrap.appendChild(cells.cho);
    wrap.appendChild(cells.jung);
    if(info.hasFinal){
      cells.jong = makeCell('jong', info.jong, blockIdx);
      wrap.appendChild(cells.jong);
    }
  } else if(info.shape === 'nf_doc'){
    cells.cho = makeCell('cho', info.cho, blockIdx);
    cells.jung = makeCell('jung', info.jung, blockIdx);
    wrap.appendChild(cells.cho);
    wrap.appendChild(cells.jung);
  } else if(info.shape === 'f_doc'){
    cells.cho = makeCell('cho', info.cho, blockIdx);
    cells.jung = makeCell('jung', info.jung, blockIdx);
    cells.jong = makeCell('jong', info.jong, blockIdx);
    wrap.appendChild(cells.cho);
    wrap.appendChild(cells.jung);
    wrap.appendChild(cells.jong);
  }

  // prefill vowel (level 1) : lock jung as given, not a drop target
  if(opts.prefillJung){
    cells.jung.classList.add('prefilled');
    attachText(cells.jung, info.jung);
    cells.jung.dataset.locked = "1";
    const rm = cells.jung.querySelector('.rm-btn'); if(rm) rm.remove();
  }

  Object.keys(cells).forEach(role=>{
    const c = cells[role];
    if(c.dataset.locked) return;
    const key = blockIdx+'-'+role;
    cellRegistry[key] = { expect: c.dataset.expect, el: c };
  });

  return wrap;
}

/* ============================ TILES/DRAG =========================== */
function makeTile(jamo){
  const id = 't'+(tileSeq++);
  const t = el('div','tile', jamo);
  t.dataset.tileid = id;
  tileRegistry[id] = { jamo, placedKey:null, el:t };
  t.addEventListener('pointerdown', onTilePointerDown);
  return t;
}

function onTilePointerDown(e){
  if(dragCtx) return;
  const tile = e.currentTarget;
  if(tile.classList.contains('hidden-tile')) return;
  const gameDone = document.getElementById('btnConfirm').dataset.locked === "1";
  if(gameDone) return;
  e.preventDefault();
  const rect = tile.getBoundingClientRect();
  const ghost = tile.cloneNode(true);
  ghost.classList.add('dragging');
  ghost.style.width = rect.width+'px';
  ghost.style.height = rect.height+'px';
  ghost.style.left = rect.left+'px';
  ghost.style.top = rect.top+'px';
  document.body.appendChild(ghost);
  tile.classList.add('hidden-tile');
  dragCtx = { tileId: tile.dataset.tileid, ghost, offX: e.clientX-rect.left, offY: e.clientY-rect.top, origin: tile };
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
}
function onDragMove(e){
  if(!dragCtx) return;
  dragCtx.ghost.style.left = (e.clientX - dragCtx.offX)+'px';
  dragCtx.ghost.style.top = (e.clientY - dragCtx.offY)+'px';
}
function onDragEnd(e){
  if(!dragCtx) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  dragCtx.ghost.style.display='none';
  const target = document.elementFromPoint(e.clientX, e.clientY);
  dragCtx.ghost.remove();
  const cell = target ? target.closest('.cell') : null;
  const tileId = dragCtx.tileId;
  const originTile = dragCtx.origin;
  dragCtx = null;

  if(cell && !cell.dataset.locked && !cell.dataset.filledTile){
    placeTileInCell(tileId, cell);
  } else {
    // return to tray
    originTile.classList.remove('hidden-tile');
  }
  updateConfirmVisibility();
}
function placeTileInCell(tileId, cell){
  const tileInfo = tileRegistry[tileId];
  cell.dataset.filledTile = tileId;
  cell.classList.add('filled');
  // insert jamo text as first child
  const textNode = document.createTextNode(tileInfo.jamo);
  cell.insertBefore(textNode, cell.firstChild);
  tileInfo.placedKey = cell.dataset.block+'-'+cell.dataset.role;
  tileInfo.el.style.display = 'none'; // remove from tray visually (stays hidden-tile)
}
function revokeCell(cell){
  if(cell.classList.contains('correct') || cell.classList.contains('wrong')) return;
  const tileId = cell.dataset.filledTile;
  if(!tileId) return;
  // remove text node(s) that are direct text children
  Array.from(cell.childNodes).forEach(n=>{ if(n.nodeType===3) cell.removeChild(n); });
  cell.classList.remove('filled');
  delete cell.dataset.filledTile;
  const tileInfo = tileRegistry[tileId];
  tileInfo.placedKey = null;
  tileInfo.el.style.display = '';
  tileInfo.el.classList.remove('hidden-tile');
  updateConfirmVisibility();
}
function updateConfirmVisibility(){
  const keys = Object.keys(cellRegistry);
  const allFilled = keys.every(k=>cellRegistry[k].el.dataset.filledTile);
  document.getElementById('btnConfirm').style.display = (allFilled && keys.length>0) ? 'inline-block' : 'none';
}

/* ============================ RENDER FLOW =========================== */
const promptBox = ()=>document.getElementById('promptBox');
const blocksRow = ()=>document.getElementById('blocksRow');
const trayVowelEl = ()=>document.getElementById('trayVowel');
const trayConsonantEl = ()=>document.getElementById('trayConsonant');
const hintPanel = ()=>document.getElementById('hintPanel');
const btnConfirm = ()=>document.getElementById('btnConfirm');
const btnNext = ()=>document.getElementById('btnNext');

function resetRoundState(){
  cellRegistry = {};
  tileRegistry = {};
  tileSeq = 0;
  blocksRow().innerHTML = '';
  trayVowelEl().innerHTML = '';
  trayConsonantEl().innerHTML = '';
  document.getElementById('traySectionVowel').style.display = 'none';
  document.getElementById('traySectionConsonant').style.display = 'none';
  promptBox().innerHTML = '';
  const rb = document.getElementById('revealBox');
  rb.style.display = 'none';
  rb.innerHTML = '';
  btnConfirm().style.display = 'none';
  btnConfirm().dataset.locked = "0";
  btnNext().style.display = 'none';
}

/* Build a tray of `total` tiles: every jamo in `required` (a multiset / array with
   possible duplicates) MUST be present, topped up with random distinct distractors
   from `alphabet` so the tray never looks sparse or leaves an obviously-unique answer. */
function buildTilePool(required, alphabet, total){
  const pool = required.slice();
  const usedValues = new Set(pool);
  const fillers = shuffle(alphabet.filter(j=>!usedValues.has(j)));
  let fi = 0;
  while(pool.length < total && fi < fillers.length){
    pool.push(fillers[fi]);
    usedValues.add(fillers[fi]);
    fi++;
  }
  return shuffle(pool);
}

function updateProgress(){
  const pct = Math.round((curIndex/questions.length)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = 'Câu '+(Math.min(curIndex+1,questions.length))+' / '+questions.length;
}

function renderQuestion(){
  updateProgress();
  resetRoundState();
  const q = questions[curIndex];

  // hint gate (level 1 only, first time a vowel-type appears)
  if(q.level === 1 && !introducedVowelTypes.has(q.items[0].info.vtype)){
    introducedVowelTypes.add(q.items[0].info.vtype);
    renderHintFor(q);
    return;
  }
  hintPanel().style.display = 'none';
  renderActualQuestion(q);
}

function vtypeLabel(vt){
  return vt==='doc' ? 'nguyên âm dọc' : vt==='ngang' ? 'nguyên âm ngang' : 'nguyên âm kép';
}

function renderHintFor(q){
  const vt = q.items[0].info.vtype;
  const demo = DEMO_EXAMPLES[vt]; // fixed example, never equal to the real question below
  const info = demo.info;
  const panel = hintPanel();
  panel.style.display = 'block';
  panel.innerHTML = '';
  panel.appendChild(el('div','hint-badge','✨ Dạng mới: '+vtypeLabel(vt)));
  const demoRow = el('div','hint-example');
  const demoBlock = buildSynBlock(info, 'demo', {});
  demoBlock.classList.add('show-tags');
  // fill demo with correct answers, marked correct (display only, non-interactive)
  ['cho','jung','jong'].forEach(role=>{
    const c = demoBlock.querySelector('.cell.'+role);
    if(!c) return;
    c.classList.add('correct');
    c.textContent = c.dataset.expect;
    const tag = el('span','cell-tag', role==='cho'?'phụ âm đầu':role==='jung'?'nguyên âm':'phụ âm cuối');
    c.appendChild(tag);
  });
  demoRow.appendChild(demoBlock);
  const txt = el('div','hint-text', 'Đây là ví dụ mẫu cho '+vtypeLabel(vt)+': chữ "'+demo.ch+'" ['+demo.rom+'] được ghép từ phụ âm đầu, nguyên âm và phụ âm cuối như hình trên. Câu hỏi thật của em sẽ là một chữ khác, giờ hãy tự ghép nhé!');
  panel.appendChild(demoRow);
  panel.appendChild(txt);
  cellRegistry = {}; // demo cells shouldn't count
  const cont = el('button','big-btn','Đã hiểu, bắt đầu làm →');
  cont.style.marginTop = '8px';
  cont.addEventListener('click', ()=>{
    panel.style.display = 'none';
    renderActualQuestion(q);
  });
  const wrapBtn = el('div'); wrapBtn.style.textAlign='center';
  wrapBtn.appendChild(cont);
  panel.appendChild(wrapBtn);
}

function renderActualQuestion(q){
  resetRoundState();
  const vowelNeeded = [];      // jung jamo actually left blank (excludes prefilled)
  const consonantNeeded = [];  // cho/jong jamo actually left blank

  if(q.mode === 'recreate-prefillVowel'){
    const item = q.items[0];
    promptBox().innerHTML = '';
    promptBox().appendChild(el('div','target-syllable korean', item.ch));
    promptBox().appendChild(el('div','target-rom', '['+item.rom+']'));
    promptBox().appendChild(el('div','instr-line', 'Nhìn âm tiết trên, kéo phụ âm đầu và phụ âm cuối vào đúng ô nhé!'));
    const block = buildSynBlock(item.info, 0, {prefillJung:true});
    blocksRow().appendChild(block);
    consonantNeeded.push(item.info.cho, item.info.jong);
  }
  else if(q.mode === 'equation'){
    const item = q.items[0];
    promptBox().innerHTML = '';
    const eq = el('div','equation-prompt korean');
    eq.appendChild(el('span','', item.info.cho));
    eq.appendChild(el('span','op','+'));
    eq.appendChild(el('span','', item.info.jung));
    eq.appendChild(el('span','op','+'));
    eq.appendChild(el('span','', item.info.jong));
    eq.appendChild(el('span','op','='));
    eq.appendChild(el('span','qmark','?'));
    promptBox().appendChild(eq);
    promptBox().appendChild(el('div','instr-line', 'Kéo 3 mảnh trên vào đúng vị trí để ghép thành âm tiết nhé!'));
    const block = buildSynBlock(item.info, 0, {});
    blocksRow().appendChild(block);
    consonantNeeded.push(item.info.cho, item.info.jong);
    vowelNeeded.push(item.info.jung);
  }
  else if(q.mode === 'recreate-blank'){
    const item = q.items[0];
    promptBox().innerHTML = '';
    promptBox().appendChild(el('div','target-syllable korean', item.ch));
    promptBox().appendChild(el('div','target-rom', '['+item.rom+']'));
    promptBox().appendChild(el('div','instr-line', 'Ghép lại âm tiết này: kéo đủ phụ âm đầu, nguyên âm, phụ âm cuối vào đúng ô.'));
    const block = buildSynBlock(item.info, 0, {});
    blocksRow().appendChild(block);
    consonantNeeded.push(item.info.cho, item.info.jong);
    vowelNeeded.push(item.info.jung);
  }
  else if(q.mode === 'recreate-blank-word'){
    promptBox().innerHTML = '';
    promptBox().appendChild(el('div','target-word korean', q.items.map(i=>i.ch).join('')));
    promptBox().appendChild(el('div','target-rom', '['+q.rom+']'));
    promptBox().appendChild(el('div','target-meaning', q.meaning));
    promptBox().appendChild(el('div','instr-line', 'Ghép lại từ này: kéo đúng mảnh vào từng âm tiết nhé!'));
    q.items.forEach((item, idx)=>{
      const block = buildSynBlock(item.info, idx, {});
      blocksRow().appendChild(block);
      consonantNeeded.push(item.info.cho);
      if(item.info.hasFinal) consonantNeeded.push(item.info.jong);
      vowelNeeded.push(item.info.jung);
    });
  }

  // Render consonant tray (always present, topped up to 10 tiles with distractors)
  const consonantPool = buildTilePool(consonantNeeded, CHO_LIST, 10);
  const cTray = trayConsonantEl();
  consonantPool.forEach(j=>cTray.appendChild(makeTile(j)));
  document.getElementById('traySectionConsonant').style.display = 'block';

  // Render vowel tray only when there's at least one blank vowel cell to fill
  if(vowelNeeded.length){
    const vowelPool = buildTilePool(vowelNeeded, JUNG_LIST, 10);
    const vTray = trayVowelEl();
    vowelPool.forEach(j=>vTray.appendChild(makeTile(j)));
    document.getElementById('traySectionVowel').style.display = 'block';
  }

  updateConfirmVisibility();
}

/* ============================ CHECK / NEXT =========================== */
function btnConfirmHandler(){
  const keys = Object.keys(cellRegistry);
  let allCorrect = true;
  keys.forEach(k=>{
    const rec = cellRegistry[k];
    const cell = rec.el;
    const tileId = cell.dataset.filledTile;
    const placedJamo = tileId ? tileRegistry[tileId].jamo : null;
    if(placedJamo === rec.expect){
      cell.classList.add('correct');
    } else {
      cell.classList.add('wrong');
      allCorrect = false;
    }
    const rm = cell.querySelector('.rm-btn'); if(rm) rm.style.display='none';
  });
  document.getElementById('btnConfirm').style.display = 'none';
  document.getElementById('btnConfirm').dataset.locked = "1";
  document.getElementById('btnNext').style.display = 'inline-block';

  const q = questions[curIndex];
  if(allCorrect){ score++; }
  else {
    wrongLog.push({ q, userSnapshot: snapshotAnswers() });
  }

  // reveal the completed word/syllable + pronunciation for modes that hid it beforehand
  if(q.mode === 'equation'){
    const item = q.items[0];
    const rb = document.getElementById('revealBox');
    rb.innerHTML = '';
    rb.appendChild(el('div','reveal-syllable korean', item.ch));
    rb.appendChild(el('div','reveal-rom', '['+item.rom+']'));
    rb.style.display = 'block';
  }
};
function snapshotAnswers(){
  const snap = {};
  Object.keys(cellRegistry).forEach(k=>{
    const cell = cellRegistry[k].el;
    const tileId = cell.dataset.filledTile;
    snap[k] = tileId ? tileRegistry[tileId].jamo : null;
  });
  return snap;
}

function goNext(){
  curIndex++;
  if(curIndex >= questions.length){
    showResults();
  } else {
    renderQuestion();
  }
}

/* ============================ RESULTS =========================== */
function showResults(){
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('resName').textContent = studentName;
  document.getElementById('resScore').textContent = score + ' / ' + questions.length + ' câu đúng';
  const rev = document.getElementById('resReview');
  rev.innerHTML = '';
  if(wrongLog.length === 0){
    rev.appendChild(el('p', null, '🎉 Tuyệt vời! Em đã làm đúng tất cả các câu!'));
  } else {
    rev.appendChild(el('h3', null, 'Cùng xem lại các câu sai để rút kinh nghiệm nhé:'));
    wrongLog.forEach(w=>{
      const q = w.q;
      const item = el('div','review-item');
      const head = el('div','rh');
      const word = q.items.map(i=>i.ch).join('');
      head.appendChild(el('span','k korean', word));
      const romTxt = q.rom ? q.rom : q.items[0].rom;
      head.appendChild(el('span','target-rom', romTxt ? '['+romTxt+']' : ''));
      item.appendChild(head);
      if(q.meaning) item.appendChild(el('div','target-meaning', q.meaning));
      q.items.forEach((it, idx)=>{
        const info = it.info;
        ['cho','jung','jong'].forEach(role=>{
          const key = idx+'-'+role;
          if(role==='jong' && !info.hasFinal) return;
          if(q.mode==='recreate-prefillVowel' && role==='jung') return; // was given
          const expect = info[role];
          const got = w.userSnapshot[key];
          if(got !== undefined && got !== expect){
            const line = el('div', got===null?'yours':'yours');
            line.textContent = (role==='cho'?'Phụ âm đầu':role==='jung'?'Nguyên âm':'Phụ âm cuối')+': em chọn "'+(got||'(bỏ trống)')+'" — đáp án đúng là "'+expect+'"';
            item.appendChild(line);
          }
        });
      });
      rev.appendChild(item);
    });
  }
}

/* ============================ INIT / GATE =========================== */
const nameInput = document.getElementById('nameInput');
const btnStart = document.getElementById('btnStart');
nameInput.addEventListener('input', ()=>{
  btnStart.disabled = nameInput.value.trim().length === 0;
});
btnStart.addEventListener('click', ()=>{
  studentName = nameInput.value.trim();
  if(!studentName) return;
  document.getElementById('screen-gate').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  startGame();
});

document.getElementById('btnConfirm').addEventListener('click', ()=>btnConfirmHandler());
document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnRestart').addEventListener('click', ()=>{
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-gate').classList.add('active');
  nameInput.value = '';
  btnStart.disabled = true;
});

function startGame(){
  curIndex = 0;
  score = 0;
  wrongLog = [];
  introducedVowelTypes = new Set();
  questions = buildQuestionSet();
  renderQuestion();
}

})();
</script>
